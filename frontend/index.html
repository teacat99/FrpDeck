<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f8fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1216" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="FrpDeck — 按需临时开放服务器端口的自助管理工具" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>FrpDeck · 临时端口开放</title>
    <script>
      // Anti-flash: apply the persisted colour scheme before Vue mounts so
      // the first paint matches the user's preference. `dark` class on the
      // root element is consumed by Tailwind's @custom-variant dark hook.
      (function () {
        try {
          var v = localStorage.getItem('frpdeck.theme');
          var dark = v === 'dark' || (v !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var c = dark ? '#0f1216' : '#f6f8fb';
          if (dark) document.documentElement.classList.add('dark');
          document.documentElement.style.background = c;
          var metas = document.querySelectorAll('meta[name="theme-color"]');
          for (var i = 0; i < metas.length; i++) metas[i].setAttribute('content', c);
        } catch (e) {}
      })();
      // Native shell purge: when the SPA is hosted by the Android WebView
      // shell (window.frpdeck is injected via addJavascriptInterface) we
      // do NOT want a service worker — the embedded loopback server is
      // always live and a stale precache from a previous APK version
      // would actively block upgrades by serving the old bundle. Run
      // this BEFORE main.ts so even a left-over SW from a prior install
      // gets nuked on the very first load after upgrade.
      (function () {
        try {
          if (typeof window.frpdeck !== 'object' || !window.frpdeck) return;
          if (!('serviceWorker' in navigator)) return;
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            if (!regs || regs.length === 0) return;
            Promise.all(regs.map(function (r) { return r.unregister(); }))
              .then(function () {
                if (window.caches && caches.keys) {
                  return caches.keys().then(function (keys) {
                    return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                  });
                }
              })
              .then(function () {
                // Reload once so the freshly-served bundle wins. Use a
                // sentinel to avoid an infinite loop if something keeps
                // re-registering a SW.
                var marker = '__frpdeck_sw_purged__';
                if (!sessionStorage.getItem(marker)) {
                  sessionStorage.setItem(marker, '1');
                  location.reload();
                }
              })
              .catch(function () {});
          }).catch(function () {});
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
