name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Go build
        run: go build ./...

  # actionlint is a static analyser for GitHub Actions workflow files.
  # It catches >40 classes of bugs that would otherwise only surface
  # at run time (typos in expressions, missing required fields,
  # invalid runs-on labels, shellcheck issues inside `run:` blocks).
  # Runs in parallel with `build` so a slow lint never holds up the
  # main pipeline; we land it as a hard gate because the existing
  # release.yml + ci.yml are clean (verified locally pre-merge), so
  # any new warning is by definition a regression worth blocking.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -w /repo \
            rhysd/actionlint:latest \
              -color
