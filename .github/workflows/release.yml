name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build date
        id: builddate
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            teacat99/frpdeck
            ghcr.io/${{ github.repository_owner }}/frpdeck
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Plumb the git tag into the binary (main.appVersion) and the
          # OCI labels (org.opencontainers.image.version / revision /
          # created). Stripping the leading "refs/tags/" yields the
          # raw "vX.Y.Z" string that matches `frpdeck-server version`.
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.builddate.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  fnos-fpk:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Build .fpk packages (x86 + arm)
        env:
          FRPDECK_SKIP_FRONTEND_BUILD: "1"
          VERSION: ${{ github.ref_name }}
        run: bash nas/fnos/build.sh

      - name: List artifacts
        run: ls -lh nas/fnos/dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nas/fnos/dist/*.fpk
          fail_on_unmatched_files: true

  synology-spk:
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Build .spk packages (x86_64 + aarch64)
        env:
          FRPDECK_SKIP_FRONTEND_BUILD: "1"
          VERSION: ${{ github.ref_name }}
        run: bash nas/synology/build.sh

      - name: List artifacts
        run: ls -lh nas/synology/dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nas/synology/dist/*.spk
          fail_on_unmatched_files: true
