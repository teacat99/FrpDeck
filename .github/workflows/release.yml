name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Probe whether the optional Docker Hub credentials are set so
      # the rest of this job can degrade to "GHCR only" when the
      # operator hasn't configured DOCKERHUB_* secrets yet. We can't
      # reference `secrets.*` directly from `if:` expressions, so the
      # convention is to lift the boolean into a step output via env.
      - name: Probe Docker Hub credentials
        id: dh
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "${DH_USER}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo '::notice::DOCKERHUB_USERNAME not set; pushing only to ghcr.io. Set secrets.DOCKERHUB_USERNAME + DOCKERHUB_TOKEN to mirror to Docker Hub.'
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.dh.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build date
        id: builddate
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # GHCR is always present; Docker Hub is conditional on the
          # secrets probe above. metadata-action ignores blank lines
          # in `images:`, so the ternary collapses cleanly when
          # Docker Hub is unavailable.
          images: |
            ghcr.io/${{ github.repository_owner }}/frpdeck
            ${{ steps.dh.outputs.available == 'true' && 'teacat99/frpdeck' || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Plumb the git tag into the binary (main.appVersion) and the
          # OCI labels (org.opencontainers.image.version / revision /
          # created). Stripping the leading "refs/tags/" yields the
          # raw "vX.Y.Z" string that matches `frpdeck-server version`.
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.builddate.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  fnos-fpk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Build .fpk packages (x86 + arm)
        env:
          FRPDECK_SKIP_FRONTEND_BUILD: "1"
          VERSION: ${{ github.ref_name }}
          APP_VERSION: ${{ github.ref_name }}
        run: bash nas/fnos/build.sh

      - name: List artifacts
        run: ls -lh nas/fnos/dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nas/fnos/dist/*.fpk
          fail_on_unmatched_files: true

  synology-spk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Build .spk packages (x86_64 + aarch64)
        env:
          FRPDECK_SKIP_FRONTEND_BUILD: "1"
          VERSION: ${{ github.ref_name }}
          APP_VERSION: ${{ github.ref_name }}
        run: bash nas/synology/build.sh

      - name: List artifacts
        run: ls -lh nas/synology/dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nas/synology/dist/*.spk
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------
  # Android APKs
  # ---------------------------------------------------------------
  # Produces 5 release APKs in one run thanks to the `splits.abi`
  # block in android/app/build.gradle.kts:
  #   - app-arm64-v8a-release.apk
  #   - app-armeabi-v7a-release.apk
  #   - app-x86-release.apk
  #   - app-x86_64-release.apk
  #   - app-universal-release.apk
  # `continue-on-error: true` means a transient SDK / NDK / gomobile
  # hiccup will not block the Docker / NAS artefacts from publishing.
  # The job is allowed to fail loudly while still letting the rest of
  # the release proceed; we re-run it manually if the failure was
  # environmental.
  android-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    continue-on-error: true
    env:
      JAVA_VERSION: '21'
      ANDROID_API_LEVEL: '34'
      ANDROID_BUILD_TOOLS: '34.0.0'
      ANDROID_NDK_VERSION: '26.1.10909125'
      APP_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-${{ env.ANDROID_API_LEVEL }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
            ndk;${{ env.ANDROID_NDK_VERSION }}

      - name: Export Android NDK path
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Initialise gomobile
        run: gomobile init

      - name: Build frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Build frpdeckmobile.aar (gomobile bind)
        run: bash android/scripts/build-aar.sh

      - name: Assemble release APKs (5 files via splits.abi)
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Stage APKs for release (rename with version + ABI)
        run: |
          set -euo pipefail
          mkdir -p dist
          ver="${APP_VERSION#v}"
          for src in android/app/build/outputs/apk/release/app-*.apk; do
            base="$(basename "$src" .apk)"
            # app-arm64-v8a-release -> arm64-v8a; app-universal-release -> universal
            abi="${base#app-}"; abi="${abi%-release}"
            cp "$src" "dist/frpdeck-${ver}-android-${abi}.apk"
          done
          ls -lh dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/frpdeck-*-android-*.apk
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------
  # Wails desktop builds
  # ---------------------------------------------------------------
  # Compile-checks the Wails GUI on all three desktop OS runners and
  # uploads the resulting bundles to the release. macOS is the
  # canonical verifier for the cgo NSStatusItem tray (see
  # cmd/server/wails_tray_darwin.{go,m}); a green darwin matrix line
  # means the cgo bridge still links cleanly.
  #
  # `continue-on-error: true` keeps a flaky desktop build (e.g. macOS
  # codesign drift, Windows wails CLI churn) from blocking the rest of
  # the release. The Docker image, NAS packages, and APK build are the
  # primary artefacts; the desktop bundles are best-effort right now.
  wails-desktop:
    permissions:
      contents: write
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            platform: linux/amd64
            archive_ext: tar.gz
          - os: macos-latest
            label: darwin-universal
            platform: darwin/universal
            archive_ext: zip
          - os: windows-latest
            label: windows-amd64
            platform: windows/amd64
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    env:
      APP_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            pkg-config \
            build-essential

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Wails build (${{ matrix.label }})
        shell: bash
        env:
          # Wails v2 uses cgo to talk to webkit2gtk / WebView2 / Cocoa,
          # so CGO_ENABLED must stay on. The macOS NSStatusItem tray
          # (cmd/server/wails_tray_darwin.{go,m}) is the canary that
          # the cgo bridge still links cleanly across Go upgrades.
          CGO_ENABLED: 1
        run: |
          set -euo pipefail
          # Wails v2 expects the "project root" (cwd) to contain main.go;
          # FrpDeck keeps the desktop entrypoint in cmd/server (alongside
          # the headless / Wails-tagged main and the cgo tray bridges).
          # `wails build` walks parent directories looking for wails.json,
          # so the repo-root wails.json is still picked up — but the
          # `frontend:dir` and `wailsjsdir` paths inside it are resolved
          # relative to the wails.json file, not cwd, so they keep
          # pointing at <repo>/frontend without further changes.
          cd cmd/server

          # Use an array rather than a quoted string so the shell does
          # not pass an empty positional arg on non-Linux platforms
          # (which actionlint flagged as SC2086 word-splitting risk).
          extra_args=()
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Ubuntu 24.04 ships webkit2gtk-4.1 only; Wails defaults
            # to 4.0 unless we opt in via this build tag.
            extra_args+=(-tags webkit2_41)
          fi
          wails build \
            -platform "${{ matrix.platform }}" \
            -ldflags "-X 'main.appVersion=${APP_VERSION}'" \
            -skipbindings \
            -clean \
            "${extra_args[@]}"

      - name: Package artefact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # wails build runs from cmd/server (see "Wails build" step), so
          # the artefacts land under cmd/server/build/bin, not the
          # repo-root build/bin you'd see for a single-entrypoint Wails
          # project.
          BIN_DIR="cmd/server/build/bin"
          case "${{ matrix.label }}" in
            linux-amd64)
              tar -czf "dist/frpdeck-desktop-${APP_VERSION}-${{ matrix.label }}.tar.gz" \
                -C "${BIN_DIR}" frpdeck-desktop
              echo "artifact=dist/frpdeck-desktop-${APP_VERSION}-${{ matrix.label }}.tar.gz" >> "$GITHUB_OUTPUT"
              ;;
            darwin-universal)
              ( cd "${BIN_DIR}" && zip -r "${GITHUB_WORKSPACE}/dist/frpdeck-desktop-${APP_VERSION}-${{ matrix.label }}.zip" "FrpDeck.app" )
              echo "artifact=dist/frpdeck-desktop-${APP_VERSION}-${{ matrix.label }}.zip" >> "$GITHUB_OUTPUT"
              ;;
            windows-amd64)
              ( cd "${BIN_DIR}" && 7z a "${GITHUB_WORKSPACE}/dist/frpdeck-desktop-${APP_VERSION}-${{ matrix.label }}.zip" "frpdeck-desktop.exe" )
              echo "artifact=dist/frpdeck-desktop-${APP_VERSION}-${{ matrix.label }}.zip" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.artifact }}
          fail_on_unmatched_files: true
